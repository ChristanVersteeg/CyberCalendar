name: Daily Tip Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-tip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get and Decompress TIPS JSON
        id: get_tips_json
        env:
          TIPS_COMPRESSED_LZMA_ENCODED: ${{ secrets.TIPS_COMPRESSED_LZMA }}
        run: |
          set -euo pipefail
          echo "Fetching and decompressing tips..."
          if]; then
            echo "$TIPS_COMPRESSED_LZMA_ENCODED" | base64 -d > compressed_data.xz
            echo "Base64 decoded data written to compressed_data.xz"
            if [[ -f "compressed_data.xz" ]]; then
              unxz -c compressed_data.xz > tips.json.decompressed
              DECOMPRESS_STATUS=$?
              if]; then
                echo "LZMA decompressed data."
                rm compressed_data.xz
              else
                echo "Error: Failed to decompress tips data using lzma!  unxz exit code: $DECOMPRESS_STATUS"
                echo '{}' > decompressed_tips.json # create empty json
                exit 1
              fi
            else
              echo "Error: Could not find the base64 decoded file 'compressed_data.xz'!"
              echo '{}' > decompressed_tips.json # create empty json
              exit 1
            fi
          else
            echo "Error: Secret 'TIPS_COMPRESSED_LZMA' not found!"
            echo '{}' > decompressed_tips.json # create empty json
            exit 1
          fi
          mv tips.json.decompressed decompressed_tips.json
          echo "Decompressed JSON written to decompressed_tips.json"

      - name: Get current tip and image info
        id: tip_info
        run: |
          DAY=$(date +%j | sed 's/^0*//')
          if [[ -s "decompressed_tips.json" ]]; then
            TEMP_TIP=$(cat decompressed_tips.json | jq -r ".tips.text")
            TEMP_IMAGE_BASE=$(cat decompressed_tips.json | jq -r ".tips.image")
            echo "tip=$TEMP_TIP" >> "$GITHUB_OUTPUT"
            echo "image_base=$TEMP_IMAGE_BASE" >> "$GITHUB_OUTPUT"
          else
            echo "tip=" >> "$GITHUB_OUTPUT"
            echo "image_base=" >> "$GITHUB_OUTPUT"
          fi

      - name: Download image if available
        id: download_image
        if: steps.tip_info.outputs.image_base!= '' && steps.tip_info.outputs.image_base!= 'null'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          IMAGE_BASE: ${{ steps.tip_info.outputs.image_base }}
          ORIGINAL: ${{ steps.tip_info.outputs.image_base }}.png
          REPO_OWNER: ChristanVersteeg
          REPO_NAME: CyberTips
          IMAGE_PATH: images
        run: |
          curl -sSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            -o "image.png" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/contents/$IMAGE_PATH/$ORIGINAL"
          if [[ -f "image.png" ]]; then
            echo "image_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "image_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy index.html
        run: |
          echo "Current working directory: ${{ github.workspace }}"
          TEMPLATE_CONTENT=$(cat index.html)
          UPDATED_CONTENT=$(echo "$TEMPLATE_CONTENT" | sed "s#{{tip}}#${{ steps.tip_info.outputs.tip }}#g")
          if [[ "${{ steps.download_image.outputs.image_exists }}" == "true" ]]; then
            UPDATED_CONTENT=$(echo "$UPDATED_CONTENT" | sed "s#{{image_section}}# <div id=\"tip-image\"><img src=\"image.png\" alt=\"Daily tip illustration\" \/></div>#g")
          else
            UPDATED_CONTENT=$(echo "$UPDATED_CONTENT" | sed "s#{{image_section}}##g")
          fi
          echo "$UPDATED_CONTENT" > index.html

      - name: Prepare gh-pages branch
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout --orphan gh-pages
          cp index.html temp_index.html
          echo "Copied modified index.html to temp_index.html"
          git rm -rf.

      - name: Add daily tip
        run: |
          echo "${{ steps.tip_info.outputs.tip }}" > tip.txt
          mv temp_index.html index.html
          git add tip.txt index.html
          if [[ -f image.png ]]; then
            git add image.png
          fi
          git commit -m "Daily tip update: $(date +'%Y-%m-%d')"

      - name: Force push to gh-pages
        run: |
          git push -f origin gh-pages